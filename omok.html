<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chobocho's 오목 V0.17</title>
    <style>
        :root {
            --bg-color: #f0f0f0;
            --board-color: #e3c16f;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100dvh;
            overflow: hidden;
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            /* 모바일 제스처/하이라이트 방지 */
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        .controls {
            flex-shrink: 0;
            background: white;
            padding: 8px;
            border-bottom: 1px solid #ddd;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            justify-content: center;
            width: 100%;
            box-sizing: border-box;
            z-index: 10;
        }

        .control-group { display: flex; flex-direction: column; gap: 2px; }
        label { font-size: 0.75rem; font-weight: bold; }
        select, button { padding: 6px 8px; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; font-size: 0.85rem;}
        button { background-color: #4CAF50; color: white; border: none; font-weight: bold; transition: 0.2s; }
        button:hover { background-color: #45a049; }
        button#hint-btn { background-color: #FF9800; }
        button#hint-btn:hover { background-color: #e68900; }

        /* 게임판 영역 */
        .game-wrapper {
            flex: 1;
            width: 100%;
            min-height: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            box-sizing: border-box;
            position: relative;
        }

        .game-container {
            display: grid;
            grid-template-columns: 20px 1fr;
            grid-template-rows: 20px 1fr;
            background: transparent;
            /* 초기 크기 (JS로 제어됨) */
            width: 300px;
            height: 300px;
            aspect-ratio: 1 / 1;
            overflow: hidden;
        }

        .coord-top {
            grid-column: 2; grid-row: 1;
            display: flex; align-items: flex-end; justify-content: space-between;
            font-weight: bold; color: #555; font-size: 0.7rem; padding-bottom: 2px;
        }
        .coord-top > div { flex: 1; text-align: center; }

        .coord-left {
            grid-column: 1; grid-row: 2;
            display: flex; flex-direction: column; align-items: flex-end; justify-content: space-between;
            font-weight: bold; color: #555; font-size: 0.7rem; padding-right: 2px;
        }
        .coord-left > div { flex: 1; display: flex; align-items: center; justify-content: flex-end; }

        canvas#boardCanvas {
            grid-column: 2; grid-row: 2;
            background-color: var(--board-color);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            cursor: pointer;
            width: 100%;
            height: 100%;
            display: block;
            border-radius: 2px;
            /* 터치 시 깜빡임 방지용 하드웨어 가속 힌트 */
            transform: translateZ(0);
        }

        .status-bar {
            flex-shrink: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 15px;
            background: white;
            border-top: 1px solid #ddd;
            box-sizing: border-box;
            font-size: 0.9rem;
        }

        .score-box { display: flex; align-items: center; font-weight: bold; }
        .score-box.black { color: black; }
        .score-box.white { color: #555; justify-content: flex-end; }

        .stone-icon {
            display: inline-block; width: 16px; height: 16px;
            border-radius: 50%; margin: 0 6px;
            box-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }
        .stone-icon.black { background: black; }
        .stone-icon.white { background: #eee; border: 1px solid #ccc; }

        #status-msg { font-weight: bold; color: #333; text-align: center; }
    </style>
</head>
<body>
<div class="controls">
    <div class="control-group">
        <label>게임 모드</label>
        <select id="mode-select">
            <option value="pve">사람 vs AI</option>
            <option value="pvp">사람 vs 사람</option>
        </select>
    </div>
    <div class="control-group" id="color-group">
        <label>내 돌 선택</label>
        <select id="player-color">
            <option value="black">흑 (선공)</option>
            <option value="white">백 (후공)</option>
        </select>
    </div>
    <button onclick="askNewGame()">새 게임(F2)</button>
    <button id="hint-btn" onclick="showHint()">💡훈수</button>
</div>

<div class="game-wrapper" id="gameWrapper">
    <div class="game-container" id="gameContainer">
        <div id="coord-top" class="coord-top"></div>
        <div id="coord-left" class="coord-left"></div>
        <canvas id="boardCanvas"></canvas>
    </div>
</div>

<div class="status-bar">
    <div class="score-box black">
        <span class="stone-icon black"></span>
        흑: <span id="cnt-black">0</span>
    </div>
    <div id="status-msg">게임 대기</div>
    <div class="score-box white">
        백: <span id="cnt-white">0</span>
        <span class="stone-icon white"></span>
    </div>
</div>

<script>
    const BOARD_SIZE = 15;
    const MAX_COUNT = BOARD_SIZE * BOARD_SIZE;

    const canvas = document.getElementById('boardCanvas');
    const ctx = canvas.getContext('2d', { alpha: false }); // 알파 채널 꺼서 성능 최적화

    // 더블 버퍼링용
    const offscreenCanvas = document.createElement('canvas');
    const offCtx = offscreenCanvas.getContext('2d', { alpha: false });

    const gameContainer = document.getElementById('gameContainer');
    const gameWrapper = document.getElementById('gameWrapper');
    const statusEl = document.getElementById('status-msg');
    const cntBlackEl = document.getElementById('cnt-black');
    const cntWhiteEl = document.getElementById('cnt-white');

    let audioCtx = null;
    let board = [];
    let currentPlayer = 1;
    let gameActive = false;
    let lastMove = null;
    let hintMove = null;
    let countBlack = 0;
    let countWhite = 0;
    let gameMode = 'pve';
    let myColor = 1;

    let cellSize = 0;
    let animationFrameId = null;

    // --- 초기화 ---
    document.getElementById('mode-select').addEventListener('change', (e) => {
        gameMode = e.target.value;
        document.getElementById('color-group').style.display = (gameMode === 'pve') ? 'flex' : 'none';
    });

    // 리사이즈: 디바운싱 없이 즉각 반응하되 rAF로 처리
    window.addEventListener('resize', () => {
        requestAnimationFrame(handleResize);
    });

    // 포인터 이벤트 (터치/마우스 통합)
    canvas.addEventListener('pointerdown', function(e) {
        e.preventDefault(); // 중요: 터치 시 깜빡임/확대 방지
        const rect = canvas.getBoundingClientRect();
        // devicePixelRatio 고려 불필요 (BoundingRect는 CSS픽셀 기준, e.clientX도 CSS픽셀 기준)
        const xPos = e.clientX - rect.left;
        const yPos = e.clientY - rect.top;
        handleInput(xPos, yPos);
    });

    function initCoords() {
        const top = document.getElementById('coord-top');
        top.innerHTML = '';
        for(let i=0; i<BOARD_SIZE; i++) {
            const d = document.createElement('div');
            d.innerText = String.fromCharCode(65 + i);
            top.appendChild(d);
        }
        const left = document.getElementById('coord-left');
        left.innerHTML = '';
        for(let i=1; i<=BOARD_SIZE; i++) {
            const d = document.createElement('div');
            d.innerText = i;
            left.appendChild(d);
        }
    }

    // --- 핵심: 리사이징 및 High DPI 처리 ---
    function handleResize() {
        const w = gameWrapper.clientWidth;
        const h = gameWrapper.clientHeight;
        // 20px(좌표 공간) + 10px(여백)
        let size = Math.min(w, h) - 10;
        if (size < 255) size = 255;

        // 1. 컨테이너 CSS 크기 설정 (항상 정사각형 유지)
        gameContainer.style.width = `${size}px`;
        gameContainer.style.height = `${size}px`;

        // 2. 캔버스의 실제 내부 해상도 조정 (High DPI 지원)
        const dpr = window.devicePixelRatio || 1;

        // 컨테이너 크기 기준으로 캔버스 영역 계산 (20px는 좌표 공간)
        // getBoundingClientRect 대신 계산된 size를 직접 사용해 정합성 확보
        const canvasCSSSize = size - 20;

        // 캔버스 메모리 크기(buffer size)를 DPI에 맞춰 키움 -> 선명해짐
        // width와 height를 동일한 canvasCSSSize로 설정하여 정사각형 유지
        canvas.width = Math.floor(canvasCSSSize * dpr);
        canvas.height = Math.floor(canvasCSSSize * dpr);

        console.log(`Canvas resized to ${canvas.width}x${canvas.height} with DPR ${dpr}`);

        // 오프스크린도 동일하게
        offscreenCanvas.width = canvas.width;
        offscreenCanvas.height = canvas.height;

        // 컨텍스트 스케일 조정 (CSS 픽셀 단위로 그리기 위해)
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.scale(dpr, dpr);

        offCtx.setTransform(1, 0, 0, 1, 0, 0);
        offCtx.scale(dpr, dpr);

        // 셀 크기 계산 (CSS 픽셀 기준)
        cellSize = canvasCSSSize / BOARD_SIZE;

        requestRender(); // 화면 갱신
    }

    // --- 렌더링 파이프라인 (깜빡임 방지) ---
    function requestRender() {
        if (animationFrameId) cancelAnimationFrame(animationFrameId);
        animationFrameId = requestAnimationFrame(renderLoop);
    }

    function renderLoop() {
        // 1. 오프스크린 캔버스에 그리기 (메모리상)
        drawToOffscreen();

        // 2. 메인 캔버스에 복사 (화면 표시)
        // dpr 때문에 drawImage시 크기를 맞춰야 함
        // 메인 캔버스 크기는 dpr이 적용된 크기이므로, 전체를 덮어쓰기 위해 width/height 사용
        // 단, scale(dpr, dpr)이 적용되어 있으므로 좌표계는 CSS 픽셀 기준
        const cssWidth = canvas.width / (window.devicePixelRatio || 1);
        const cssHeight = canvas.height / (window.devicePixelRatio || 1);

        ctx.clearRect(0, 0, cssWidth, cssHeight);
        ctx.drawImage(offscreenCanvas, 0, 0, cssWidth, cssHeight);
    }

    function drawToOffscreen() {
        if (cellSize <= 0) return;
        const width = offscreenCanvas.width / (window.devicePixelRatio || 1);
        const height = offscreenCanvas.height / (window.devicePixelRatio || 1);

        // 배경
        offCtx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--board-color');
        offCtx.fillRect(0, 0, width, height);

        // 격자
        offCtx.beginPath();
        offCtx.strokeStyle = "#000";
        offCtx.lineWidth = 1;
        for (let i = 0; i < BOARD_SIZE; i++) {
            const p = i * cellSize + cellSize / 2;
            // 수평
            offCtx.moveTo(cellSize/2, p);
            offCtx.lineTo(width - cellSize/2, p);
            // 수직
            offCtx.moveTo(p, cellSize/2);
            offCtx.lineTo(p, height - cellSize/2);
        }
        offCtx.stroke();

        // 화점
        [[3,3], [11,3], [7,7], [3,11], [11,11]].forEach(([x,y]) => {
            const cx = x * cellSize + cellSize/2;
            const cy = y * cellSize + cellSize/2;
            offCtx.beginPath();
            offCtx.arc(cx, cy, Math.max(3, cellSize * 0.08), 0, Math.PI*2);
            offCtx.fillStyle = "black";
            offCtx.fill();
        });

        // 돌
        for(let y=0; y<BOARD_SIZE; y++){
            for(let x=0; x<BOARD_SIZE; x++){
                if(board[y][x] !== 0) drawStone(x, y, board[y][x]);
            }
        }

        // 마커
        if(lastMove) drawMarker(lastMove.x, lastMove.y, 'red');
        if(hintMove) drawMarker(hintMove.x, hintMove.y, 'rgba(255, 0, 255, 0.7)', true);
    }

    function drawStone(x, y, player) {
        const cx = x * cellSize + cellSize / 2;
        const cy = y * cellSize + cellSize / 2;
        const r = (cellSize / 2) * 0.85;

        offCtx.beginPath();
        offCtx.arc(cx, cy, r, 0, Math.PI * 2);

        // 그라데이션 중심 약간 이동
        const grad = offCtx.createRadialGradient(cx - r/3, cy - r/3, r/10, cx, cy, r);
        if (player === 1) {
            grad.addColorStop(0, "#555");
            grad.addColorStop(1, "black");
        } else {
            grad.addColorStop(0, "white");
            grad.addColorStop(1, "#ccc");
        }
        offCtx.fillStyle = grad;

        // 그림자
        offCtx.shadowColor = "rgba(0,0,0,0.4)";
        offCtx.shadowBlur = r * 0.2;
        offCtx.shadowOffsetX = r * 0.1;
        offCtx.shadowOffsetY = r * 0.1;

        offCtx.fill();

        // 그림자 초기화
        offCtx.shadowColor = "transparent";
        offCtx.shadowBlur = 0;
        offCtx.shadowOffsetX = 0;
        offCtx.shadowOffsetY = 0;
    }

    function drawMarker(x, y, color, pulse) {
        const cx = x * cellSize + cellSize / 2;
        const cy = y * cellSize + cellSize / 2;
        const s = pulse ? cellSize * 0.15 : cellSize * 0.1;

        offCtx.beginPath();
        offCtx.arc(cx, cy, s, 0, Math.PI*2);
        offCtx.fillStyle = color;
        offCtx.fill();

        if(pulse) {
            offCtx.beginPath();
            offCtx.arc(cx, cy, s + cellSize*0.1, 0, Math.PI*2);
            offCtx.strokeStyle = color;
            offCtx.lineWidth = 2;
            offCtx.stroke();
        }
    }

    // --- 사운드 ---
    function initAudio() {
        if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if(audioCtx.state === 'suspended') audioCtx.resume();
    }
    function playSound() {
        if(!audioCtx) initAudio();
        const t = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        // "탁" 소리 시뮬레이션 (짧은 노이즈 + 톤)
        osc.frequency.setValueAtTime(800, t);
        osc.frequency.exponentialRampToValueAtTime(100, t + 0.05);

        gain.gain.setValueAtTime(1, t);
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.05);

        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(t);
        osc.stop(t + 0.05);
    }

    // --- 게임 로직 ---
    function initBoard() {
        board = Array(BOARD_SIZE).fill(0).map(()=>Array(BOARD_SIZE).fill(0));
        initCoords();
        countBlack=0; countWhite=0; hintMove=null;
        updateCounter();
        // 리사이즈 강제 호출로 초기 그리기
        handleResize();
    }

    function startGame() {
        initAudio();
        gameMode = document.getElementById('mode-select').value;
        myColor = (document.getElementById('player-color').value === 'black') ? 1 : 2;
        initBoard();
        currentPlayer = 1; gameActive = true; lastMove = null;
        updateStatus();
        if(gameMode === 'pve' && myColor === 2) setTimeout(aiMove, 500);
    }

    function handleInput(xPos, yPos) {
        if (!gameActive) return;
        // 좌표 변환 (CSS 픽셀 기준)
        const x = Math.floor(xPos / cellSize);
        const y = Math.floor(yPos / cellSize);

        if (x < 0 || x >= BOARD_SIZE || y < 0 || y >= BOARD_SIZE) return;
        if (board[y][x] !== 0) return;
        if (gameMode === 'pve' && currentPlayer !== myColor) return;

        initAudio();
        placeStone(x, y, currentPlayer);

        if(checkWin(x, y, currentPlayer)) { endGame(currentPlayer); return; }
        if(countBlack + countWhite >= MAX_COUNT) { endGameDraw(); return; }

        currentPlayer = 3 - currentPlayer; // 1->2, 2->1
        updateStatus();
        if(gameMode === 'pve') setTimeout(aiMove, 100);
    }

    function placeStone(x, y, player) {
        board[y][x] = player;
        lastMove = {x, y};
        hintMove = null;
        playSound();
        if(player === 1) countBlack++; else countWhite++;
        updateCounter();
        requestRender();
    }

    function aiMove() {
        if(!gameActive) return;
        const move = getBestMove();
        if(move) {
            placeStone(move.x, move.y, currentPlayer);
            if(checkWin(move.x, move.y, currentPlayer)) endGame(currentPlayer);
            else if(countBlack + countWhite >= MAX_COUNT) endGameDraw();
            else {
                currentPlayer = 3 - currentPlayer;
                updateStatus();
            }
        }
    }

    // --- 유틸 ---
    function updateCounter() {
        cntBlackEl.innerText = countBlack;
        cntWhiteEl.innerText = countWhite;
    }
    function updateStatus() {
        statusEl.innerText = (currentPlayer===1 ? "흑 차례" : "백 차례");
    }
    function endGame(w) {
        gameActive = false;
        requestRender();
        const msg = (w===1 ? "흑돌 승리! 🎉" : "백돌 승리! 🎉");
        statusEl.innerText = msg;
        setTimeout(()=>alert(msg), 10);
    }
    function endGameDraw() {
        gameActive = false;
        requestRender();
        statusEl.innerText = "무승부";
        setTimeout(()=>alert("무승부"), 10);
    }

    // --- 승리/AI 로직 (이전과 동일, 축약됨) ---
    function checkWin(x,y,p){
        const dirs=[[1,0],[0,1],[1,1],[1,-1]];
        for(let [dx,dy] of dirs){
            let cnt=1;
            for(let i=1;i<5;i++){ if(getVal(x+dx*i,y+dy*i)!==p) break; cnt++; }
            for(let i=1;i<5;i++){ if(getVal(x-dx*i,y-dy*i)!==p) break; cnt++; }
            if(cnt>=5) return true;
        }
        return false;
    }
    function getVal(x,y){
        if(x<0||x>=BOARD_SIZE||y<0||y>=BOARD_SIZE) return -1;
        return board[y][x];
    }
    function getBestMove() {
        let max=-Infinity, bests=[]; const c = 7;
        for(let y=0;y<BOARD_SIZE;y++){
            for(let x=0;x<BOARD_SIZE;x++){
                if(board[y][x]!==0) continue;
                const a = evalPos(x,y,currentPlayer);
                const d = evalPos(x,y,3-currentPlayer);
                let sc = a+d + (30 - Math.abs(x-c)-Math.abs(y-c));
                if(a>=10000) sc=a*1.2; else if(d>=10000) sc=d;
                if(sc>max){ max=sc; bests=[{x,y}]; }
                else if(sc===max) bests.push({x,y});
            }
        }
        return bests.length ? bests[Math.floor(Math.random()*bests.length)] : null;
    }
    function evalPos(x,y,p){
        let score=0;
        const dirs=[[1,0],[0,1],[1,1],[1,-1]];
        for(let [dx,dy] of dirs){
            let cnt=1, open=0;
            // Forward
            let i=1; while(true){
                const v=getVal(x+dx*i, y+dy*i);
                if(v===p) cnt++; else { if(v===0) open++; break; } i++;
            }
            // Backward
            i=1; while(true){
                const v=getVal(x-dx*i, y-dy*i);
                if(v===p) cnt++; else { if(v===0) open++; break; } i++;
            }
            if(cnt>=5) score+=100000;
            else if(cnt===4) score += (open===2?10000:1000);
            else if(cnt===3) score += (open===2?1000:100);
            else if(cnt===2 && open===2) score+=100;
        }
        return score;
    }
    function showHint(){
        if(!gameActive) return;
        const m = getBestMove();
        if(m) { hintMove=m; requestRender(); }
    }

    function askNewGame() {
        if (gameActive && (countBlack > 0 || countWhite > 0)) {
            if (confirm('게임이 진행 중입니다. 정말로 새 게임을 시작하시겠습니까?')) {
                startGame();
            }
        } else {
            startGame();
        }
    }

    document.addEventListener('keydown', e => {
        if(e.key.toLowerCase()==='h') showHint();
        if (e.key === 'F2') {
            e.preventDefault();
            askNewGame();
        }
    });

    // 초기 실행
    initBoard();
</script>
</body>
</html>
